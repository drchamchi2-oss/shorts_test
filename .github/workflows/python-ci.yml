name: Python CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile main script
        run: python -m py_compile main_gpt.py scripts/doctor.py

      - name: Run tests
        run: python -m pytest

      - name: Run static security scan
        run: python -m bandit -r main_gpt.py scripts -x tests -ll

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.txt
